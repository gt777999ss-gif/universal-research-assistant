app:
  name: Universal Public Information Research Assistant
  version: 12.0.0
  user_agent: universal-research-assistant/1.0

sources:
  youtube:
    enabled: true
    api_key_env: YOUTUBE_API_KEY
  google_news:
    enabled: true
  hacker_news:
    enabled: true
    endpoint: https://hn.algolia.com/api/v1/search_by_date
    requires_api_key: false
  github_releases:
    enabled: true
    endpoint: https://api.github.com/repos/{owner}/{repo}/releases
    requires_api_key: false
    repositories:
      - comfyanonymous/ComfyUI
      - Comfy-Org/ComfyUI-Manager
      - huggingface/diffusers
      - huggingface/transformers
      - Lightricks/LTX-Video
      - THUDM/CogVideo
      - hunyuanvideo/HunyuanVideo
      - Open-Sora/Open-Sora
      - AILab-CVC/VideoCrafter
  github_commits:
    enabled: true
    lookback_days: 7
    max_commits_per_repo: 30
    repositories:
      - comfyanonymous/ComfyUI
      - Comfy-Org/ComfyUI-Manager
      - huggingface/diffusers
      - huggingface/transformers
      - Lightricks/LTX-Video
      - THUDM/CogVideo
      - AILab-CVC/VideoCrafter
      - Wan-Video/Wan2.1
  arxiv:
    enabled: true
    max_results: 30
    lookback_days: 7
    categories: [cs.CV, cs.AI, cs.LG, cs.MM, stat.ML]
  rss:
    enabled: true
    # Verified 2026-07-11 with RSS/Atom Accept headers.
    feeds:
      - name: OpenAI News
        url: https://openai.com/news/rss.xml
        enabled: true
      - name: Google AI Blog
        url: https://blog.google/technology/ai/rss/
        enabled: true
    # No verified official public RSS URL was available at configuration time.
    disabled_feeds:
      - name: Google DeepMind Blog
        enabled: false
        note: Enable only after verifying an official feed URL.
      - name: Runway Blog
        enabled: false
        note: Enable only after verifying an official feed URL.
      - name: Luma Blog
        enabled: false
        note: Enable only after verifying an official feed URL.
      - name: Pika Blog
        enabled: false
        note: Enable only after verifying an official feed URL.
      - name: HeyGen Blog
        enabled: false
        note: Enable only after verifying an official feed URL.
  reddit:
    enabled: false
    enabled_env: REDDIT_ENABLED
    client_id_env: REDDIT_CLIENT_ID
    client_secret_env: REDDIT_CLIENT_SECRET
    user_agent_env: REDDIT_USER_AGENT
  x:
    enabled: true
    bearer_token_env: X_BEARER_TOKEN
  tiktok:
    enabled: true
    mode: placeholder
  manual_csv:
    enabled: true
    directory: data/manual_imports

processing:
  max_summary_chars: 500
  duplicate_title_similarity: 0.9
  spam_terms:
    - casino
    - betting
    - adult
    - loan
    - click here
  ad_terms:
    - sponsored
    - advertisement
    - promoted
    - coupon
    - promo code
    - deal
