openapi: 3.1.0
info:
  title: Universal Public Information Research Assistant
  description: Universal public information research assistant. It searches permitted
    public sources, filters spam and duplicates, ranks relevant results, and returns
    clean JSON. It does not recommend products, suppliers, purchases, or sales strategies
    unless explicitly asked.
  version: 3.0.0
servers:
- url: https://universal-research-assistant.onrender.com
  description: Production server
paths:
  /health:
    get:
      summary: Check service health
      description: Public health check endpoint. Does not require an API key.
      operationId: getHealth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
      security: []
  /privacy:
    get:
      summary: Privacy policy
      description: Public privacy policy page. Does not require an API key.
      operationId: getPrivacyPolicy
      responses:
        '200':
          description: Successful Response
          content:
            text/html:
              schema:
                type: string
      security: []
  /sources:
    get:
      summary: List source availability
      description: Public endpoint showing which sources are configured and available.
      operationId: getSources
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourcesResponse'
      security: []
  /search:
    post:
      summary: Search public information sources
      description: Searches selected public sources, removes duplicate/spam/advertising
        results, ranks by relevance, summarizes each result, and returns clean JSON.
        Requires the `X-API-Key` header.
      operationId: searchPublicInformation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
            examples:
              recent_public_discussions:
                summary: Recent public discussions
                value:
                  query: Find recent public discussions about AI search tools
                  sources:
                  - google_news
                  - web
                  days: 30
                  limit: 10
                  language: any
                  country: any
              youtube_videos:
                summary: Recent YouTube videos
                value:
                  query: Find recent YouTube videos about automatic pet feeders
                  sources:
                  - youtube
                  days: 30
                  limit: 20
                  language: en
                  country: US
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
          description: Service health status.
          examples:
          - ok
        service:
          type: string
          title: Service
          description: Service identifier.
          examples:
          - universal-research-assistant
      type: object
      required:
      - status
      - service
      title: HealthResponse
    SearchRequest:
      properties:
        query:
          anyOf:
          - type: string
            maxLength: 500
            minLength: 1
          - type: 'null'
          title: Query
          description: Natural language public information search request. Provide
            either query or queries.
          examples:
          - Find recent Reddit discussions and Google News articles about AI search
            tools.
        queries:
          items:
            type: string
          type: array
          title: Queries
          description: Batch search queries. If provided, every query is searched
            and results are merged.
          examples:
          - - AI video tools
            - AI agent tools
            - TikTok Shop Thailand pet products
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - web
            - manual_csv
          type: array
          title: Sources
          description: Sources to search. Defaults to Google News and general web
            search.
          default:
          - google_news
          - web
          examples:
          - - google_news
            - web
        days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Days
          description: Search recency window in days.
          default: 30
        limit:
          type: integer
          maximum: 100.0
          minimum: 1.0
          title: Limit
          description: Maximum number of results to return.
          default: 10
        language:
          type: string
          maxLength: 20
          minLength: 2
          title: Language
          description: Language code or 'any'.
          default: any
        country:
          type: string
          maxLength: 20
          minLength: 2
          title: Country
          description: Country/region code or 'any'.
          default: any
        export_csv:
          type: boolean
          title: Export Csv
          description: When true, also write a CSV report under reports/.
          default: false
        export_markdown:
          type: boolean
          title: Export Markdown
          description: When true, also write a Markdown report under reports/.
          default: false
      type: object
      title: SearchRequest
    SearchResponse:
      properties:
        query:
          type: string
          title: Query
          default: ''
        queries:
          items:
            type: string
          type: array
          title: Queries
        sources:
          items:
            type: string
          type: array
          title: Sources
        warnings:
          items:
            type: string
          type: array
          title: Warnings
        results:
          items:
            $ref: '#/components/schemas/SearchResult'
          type: array
          title: Results
        exports:
          additionalProperties:
            type: string
          type: object
          title: Exports
      type: object
      required:
      - sources
      - results
      title: SearchResponse
    SearchResult:
      properties:
        source:
          type: string
          title: Source
          description: Source that produced the result.
          default: ''
        title:
          type: string
          title: Title
          description: Result title.
          default: ''
        url:
          type: string
          title: Url
          description: Canonical result URL.
          default: ''
        author:
          type: string
          title: Author
          description: Public author, channel, source, or publisher when available.
          default: ''
        date:
          anyOf:
          - type: string
          - type: 'null'
          title: Date
          description: Published date or indexed date when available.
        summary:
          type: string
          title: Summary
          description: Short result summary.
          default: ''
        full_text:
          type: string
          title: Full Text
          description: Full public text when available from the source.
          default: ''
        image_url:
          type: string
          title: Image Url
          description: Image or thumbnail URL when available.
          default: ''
        video_url:
          type: string
          title: Video Url
          description: Video URL when available.
          default: ''
        likes:
          anyOf:
          - type: integer
          - type: 'null'
          title: Likes
          description: Public like/upvote count when available.
        comments:
          anyOf:
          - type: integer
          - type: 'null'
          title: Comments
          description: Public comment/reply count when available.
        shares:
          anyOf:
          - type: integer
          - type: 'null'
          title: Shares
          description: Public share/repost count when available.
        views:
          anyOf:
          - type: integer
          - type: 'null'
          title: Views
          description: Public view count when available.
        reason_selected:
          type: string
          title: Reason Selected
          description: Why the result was selected for the query.
          default: ''
        score:
          type: number
          title: Score
          description: Internal relevance and recency score used for ranking.
          default: 0
        tags:
          items:
            type: string
          type: array
          title: Tags
          description: Simple tags inferred from source and query terms.
      type: object
      title: SearchResult
    SourceStatus:
      properties:
        name:
          type: string
          enum:
          - youtube
          - x
          - tiktok
          - reddit
          - google_news
          - web
          - manual_csv
          title: Name
        available:
          type: boolean
          title: Available
        requires_api_key:
          type: boolean
          title: Requires Api Key
        configured:
          type: boolean
          title: Configured
        note:
          type: string
          title: Note
          default: ''
      type: object
      required:
      - name
      - available
      - requires_api_key
      - configured
      title: SourceStatus
    SourcesResponse:
      properties:
        sources:
          items:
            $ref: '#/components/schemas/SourceStatus'
          type: array
          title: Sources
      type: object
      required:
      - sources
      title: SourcesResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    APIKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
