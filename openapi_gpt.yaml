    SearchRequest:
      properties:
        query:
          anyOf:
          - type: string
            maxLength: 500
            minLength: 1
          - type: 'null'
          title: Query
          description: Natural language public information search request. Provide
            either query or queries.
          examples:
          - Find recent Reddit discussions and Google News articles about AI search
            tools.
        queries:
          items:
            type: string
          type: array
          title: Queries
          description: Batch search queries. If provided, every query is searched
            and results are merged.
          examples:
          - - AI video tools
            - AI agent tools
            - TikTok Shop Thailand pet products
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - rss
            - web
            - manual_csv
          type: array
          title: Sources
          description: Sources to search. Defaults to Google News and general web
            search.
          default:
          - google_news
          - web
          examples:
          - - google_news
            - web
        days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Days
          description: Search recency window in days.
          default: 30
        limit:
          type: integer
          maximum: 100.0
          minimum: 1.0
          title: Limit
          description: Maximum number of results to return.
          default: 10
        language:
          type: string
          maxLength: 20
          minLength: 2
          title: Language
          description: Language code or 'any'.
          default: any
        country:
          type: string
          maxLength: 20
          minLength: 2
          title: Country
          description: Country/region code or 'any'.
          default: any
        export_csv:
          type: boolean
          title: Export Csv
          description: When true, also write a CSV report under reports/.
          default: false
        export_markdown:
          type: boolean
          title: Export Markdown
          description: When true, also write a Markdown report under reports/.
          default: false
        include_analysis:
          type: boolean
          title: Include Analysis
          description: Include a lightweight deterministic analysis summary.
          default: false
      type: object
      title: SearchRequest
    SearchResponse:
      properties:
        query:
          type: string
          title: Query
          default: ''
        queries:
          items:
            type: string
          type: array
          title: Queries
        sources:
          items:
            type: string
          type: array
          title: Sources
        warnings:
          items:
            type: string
          type: array
          title: Warnings
        results:
          items:
            $ref: '#/components/schemas/SearchResult'
          type: array
          title: Results
        exports:
          type: object
          title: Exports
          properties:
            csv:
              type: string
            markdown:
              type: string
        analysis:
          anyOf:
          - type: object
            properties:
              data:
                type: string
                description: Serialized response data.
          - type: 'null'
          title: Analysis
      type: object
      required:
      - sources
      - results
      title: SearchResponse
    SearchResult:
      properties:
        source:
          type: string
          title: Source
          description: Source that produced the result.
          default: ''
        title:
          type: string
          title: Title
          description: Result title.
          default: ''
        url:
          type: string
          title: Url
          description: Canonical result URL.
          default: ''
        author:
          type: string
          title: Author
          description: Public author, channel, source, or publisher when available.
          default: ''
        date:
          anyOf:
          - type: string
          - type: 'null'
          title: Date
          description: Published date or indexed date when available.
        summary:
          type: string
          title: Summary
          description: Short result summary.
          default: ''
        full_text:
          type: string
          title: Full Text
          description: Full public text when available from the source.
          default: ''
        image_url:
          type: string
          title: Image Url
          description: Image or thumbnail URL when available.
          default: ''
        video_url:
          type: string
          title: Video Url
          description: Video URL when available.
          default: ''
        likes:
          anyOf:
          - type: integer
          - type: 'null'
          title: Likes
          description: Public like/upvote count when available.
        comments:
          anyOf:
          - type: integer
          - type: 'null'
          title: Comments
          description: Public comment/reply count when available.
        shares:
          anyOf:
          - type: integer
          - type: 'null'
          title: Shares
          description: Public share/repost count when available.
        views:
          anyOf:
          - type: integer
          - type: 'null'
          title: Views
          description: Public view count when available.
        reason_selected:
          type: string
          title: Reason Selected
          description: Why the result was selected for the query.
          default: ''
        score:
          type: number
          title: Score
          description: Internal relevance and recency score used for ranking.
          default: 0
        tags:
          items:
            type: string
          type: array
          title: Tags
          description: Simple tags inferred from source and query terms.
      type: object
      title: SearchResult
    SourceBreakdownItem:
      properties:
        source:
          type: string
          title: Source
        result_count:
          type: integer
          title: Result Count
        major_topics:
          items:
            type: string
          type: array
          title: Major Topics
      type: object
      required:
      - source
      - result_count
      title: SourceBreakdownItem
    SourceStatus:
      properties:
        name:
          type: string
          enum:
          - youtube
          - x
          - tiktok
          - reddit
          - google_news
          - rss
          - web
          - manual_csv
          title: Name
        available:
          type: boolean
          title: Available
        requires_api_key:
          type: boolean
          title: Requires Api Key
        configured:
          type: boolean
          title: Configured
        note:
          type: string
          title: Note
          default: ''
      type: object
      required:
      - name
      - available
      - requires_api_key
      - configured
      title: SourceStatus
    SourcesResponse:
      properties:
        sources:
          items:
            $ref: '#/components/schemas/SourceStatus'
          type: array
          title: Sources
      type: object
      required:
      - sources
      title: SourcesResponse
    TopicWatchCreateRequest:
      properties:
        name:
          type: string
          maxLength: 120
          minLength: 1
          title: Name
        goal:
          type: string
          maxLength: 500
          minLength: 1
          title: Goal
        topics:
          items:
            type: string
          type: array
          title: Topics
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - rss
            - web
            - manual_csv
          type: array
          title: Sources
          default:
          - google_news
          - web
        frequency:
          type: string
          enum:
          - hourly
          - daily
          - weekly
          title: Frequency
          default: daily
        analysis_type:
          type: string
          enum:
          - general
          - trend
          - market
          - competitor
          - customer_feedback
          - risk
          - opportunity
          title: Analysis Type
          default: trend
        enabled:
          type: boolean
          title: Enabled
          default: true
      type: object
      required:
      - name
      - goal
      title: TopicWatchCreateRequest
    TopicWatchCreateResponse:
      properties:
        watch_id:
          type: string
          title: Watch Id
        name:
          type: string
          title: Name
        created_monitors:
          items:
            $ref: '#/components/schemas/Monitor'
          type: array
          title: Created Monitors
        status:
          type: string
          title: Status
          default: created
        warnings:
          items:
            type: string
          type: array
          title: Warnings
      type: object
      required:
      - watch_id
      - name
      title: TopicWatchCreateResponse
    TrendItem:
      properties:
        trend:
          type: string
          title: Trend
        explanation:
          type: string
          title: Explanation
        evidence:
          items:
            type: string
          type: array
          title: Evidence
        confidence:
          type: string
          title: Confidence
          default: low
      type: object
      required:
      - trend
      - explanation
      title: TrendItem
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
          properties:
            field:
              type: string
            message:
              type: string
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    APIKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
