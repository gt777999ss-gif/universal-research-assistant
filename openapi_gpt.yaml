openapi: 3.1.0
info:
  title: Universal Research Assistant V9 GPT Actions API
  description: ChatGPT Actions optimized OpenAPI specification for the Universal Research
    Assistant. This reduced schema keeps the most important public information research,
    agent, monitoring, reporting, and MCP wrapper operations under the ChatGPT Actions
    operation limit.
  version: 9.0.0
servers:
- url: https://universal-research-assistant.onrender.com
  description: Production server
paths:
  /health:
    get:
      summary: Check service health
      description: Public health check endpoint. Does not require an API key.
      operationId: getHealth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
      security: []
  /sources:
    get:
      summary: List source availability
      description: Public endpoint showing which sources are configured and available.
      operationId: getSources
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourcesResponse'
      security: []
  /search:
    post:
      summary: Search public information sources
      description: Searches selected public sources, removes duplicate/spam/advertising
        results, ranks by relevance, summarizes each result, and returns clean JSON.
        Requires the `X-API-Key` header.
      operationId: searchPublicInformation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
            examples:
              recent_public_discussions:
                summary: Recent public discussions
                value:
                  query: Find recent public discussions about AI search tools
                  sources:
                  - google_news
                  - web
                  days: 30
                  limit: 10
                  language: any
                  country: any
              youtube_videos:
                summary: Recent YouTube videos
                value:
                  query: Find recent YouTube videos about automatic pet feeders
                  sources:
                  - youtube
                  days: 30
                  limit: 20
                  language: en
                  country: US
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /analyze:
    post:
      summary: Analyze public information
      description: Runs the public information search pipeline and returns a deterministic
        structured analysis report.
      operationId: analyzePublicInformation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /report:
    post:
      summary: Generate a Markdown research report
      description: Runs public information search and deterministic analysis, then
        returns a Markdown report.
      operationId: generateResearchReport
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /report/export:
    post:
      summary: Export an enterprise research report
      description: Generates and exports a research report as Markdown, HTML, JSON,
        or PDF placeholder. Requires the X-API-Key header.
      operationId: exportResearchReport
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportExportRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportExportResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /batch:
    post:
      summary: Run multiple research analysis tasks
      description: Runs multiple public information research tasks and returns concise
        deterministic analysis summaries.
      operationId: batchResearchTasks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /agent/plan:
    post:
      summary: Plan an autonomous research task
      description: Creates deterministic multi-step public information research plans
        from a broad goal. Requires the X-API-Key header.
      operationId: planResearchAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentPlanRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPlanResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /agent/run:
    post:
      summary: Run an autonomous research investigation
      description: Plans, searches, deduplicates, analyzes, and returns a deterministic
        research briefing. Requires the X-API-Key header.
      operationId: runResearchAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRunRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /agent/changes:
    post:
      summary: Detect topic changes
      description: Compares current public information signals against prior saved
        reports when available. Requires the X-API-Key header.
      operationId: detectTopicChanges
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChangesRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentChangesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /agent/briefing:
    post:
      summary: Generate an autonomous research briefing
      description: Runs a deterministic public information research briefing for a
        goal and topics. Requires the X-API-Key header.
      operationId: generateAgentBriefing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentBriefingRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentBriefingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /monitors:
    get:
      summary: List monitor jobs
      description: Lists saved monitor jobs for the monitoring center. Requires the
        X-API-Key header.
      operationId: listEnterpriseMonitors
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorListResponse'
      security:
      - APIKeyHeader: []
    post:
      summary: Create a monitor job
      description: Creates a saved monitor job with optional saved searches and alert
        rules. Requires the X-API-Key header.
      operationId: createEnterpriseMonitor
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitorConfig'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monitor'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /monitors/{id}:
    put:
      summary: Edit, enable, or disable a monitor job
      description: Updates monitor configuration. Set enabled true or false to enable/disable
        jobs. Requires the X-API-Key header.
      operationId: updateEnterpriseMonitor
      security:
      - APIKeyHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitorUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monitor'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete a monitor job
      description: Deletes one monitor job. Requires the X-API-Key header.
      operationId: deleteEnterpriseMonitor
      security:
      - APIKeyHeader: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Deleteenterprisemonitor
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /monitor/run:
    post:
      summary: Run monitors manually
      description: Runs one monitor by ID or all due enabled monitors. Requires the
        X-API-Key header.
      operationId: runMonitors
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitorRunRequest'
              default:
                force: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorRunResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /alerts:
    get:
      summary: List recent alerts
      description: Lists locally stored alert events. Requires the X-API-Key header.
      operationId: listAlerts
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsResponse'
      security:
      - APIKeyHeader: []
  /scheduler:
    get:
      summary: Get scheduler status
      description: Returns in-process scheduler status and supported frequencies.
        Requires the X-API-Key header.
      operationId: getSchedulerStatus
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulerResponse'
      security:
      - APIKeyHeader: []
  /reports:
    get:
      summary: List report history
      description: Public endpoint listing report dates and recent report files.
      operationId: listReports
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportsIndexResponse'
      security: []
  /reports/{date}:
    get:
      summary: List reports for a date
      description: Public endpoint listing Markdown, HTML, and JSON reports for one
        date.
      operationId: listReportsByDate
      parameters:
      - name: date
        in: path
        required: true
        schema:
          type: string
          title: Date
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportsByDateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security: []
  /mcp/search:
    post:
      summary: MCP search wrapper
      description: MCP-compatible wrapper around /search. Requires the X-API-Key header.
      operationId: mcpSearch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /mcp/analyze:
    post:
      summary: MCP analyze wrapper
      description: MCP-compatible wrapper around /analyze. Requires the X-API-Key
        header.
      operationId: mcpAnalyze
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /mcp/briefing:
    post:
      summary: MCP briefing wrapper
      description: MCP-compatible wrapper around /agent/briefing. Requires the X-API-Key
        header.
      operationId: mcpBriefing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentBriefingRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentBriefingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
components:
  schemas:
    AgentBriefingRequest:
      properties:
        goal:
          type: string
          maxLength: 500
          minLength: 1
          title: Goal
        topics:
          items:
            type: string
          type: array
          title: Topics
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - rss
            - web
            - manual_csv
          type: array
          title: Sources
          default:
          - google_news
          - web
        days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Days
          default: 7
        output_language:
          type: string
          title: Output Language
          default: auto
        use_ai:
          type: boolean
          title: Use Ai
          default: false
        ai_provider:
          type: string
          enum:
          - auto
          - gemini
          - openai
          - none
          title: Ai Provider
          default: auto
      type: object
      required:
      - goal
      title: AgentBriefingRequest
    AgentBriefingResponse:
      properties:
        title:
          type: string
          title: Title
        date:
          type: string
          title: Date
        briefing:
          type: string
          title: Briefing
        top_items:
          items:
            $ref: '#/components/schemas/SearchResult'
          type: array
          title: Top Items
        watch_next:
          items:
            type: string
          type: array
          title: Watch Next
        warnings:
          items:
            type: string
          type: array
          title: Warnings
      type: object
      required:
      - title
      - date
      - briefing
      title: AgentBriefingResponse
    AgentChangesRequest:
      properties:
        topic:
          type: string
          maxLength: 500
          minLength: 1
          title: Topic
        days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Days
          default: 30
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - rss
            - web
            - manual_csv
          type: array
          title: Sources
          default:
          - google_news
          - web
      type: object
      required:
      - topic
      title: AgentChangesRequest
    AgentChangesResponse:
      properties:
        topic:
          type: string
          title: Topic
        new_topics:
          items:
            type: string
          type: array
          title: New Topics
        growing_topics:
          items:
            type: string
          type: array
          title: Growing Topics
        declining_topics:
          items:
            type: string
          type: array
          title: Declining Topics
        repeated_topics:
          items:
            type: string
          type: array
          title: Repeated Topics
        new_risks:
          items:
            type: string
          type: array
          title: New Risks
        new_opportunities:
          items:
            type: string
          type: array
          title: New Opportunities
        summary:
          type: string
          title: Summary
        warnings:
          items:
            type: string
          type: array
          title: Warnings
      type: object
      required:
      - topic
      - summary
      title: AgentChangesResponse
    AgentPlanRequest:
      properties:
        goal:
          type: string
          maxLength: 500
          minLength: 1
          title: Goal
        topics:
          items:
            type: string
          type: array
          title: Topics
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - rss
            - web
            - manual_csv
          type: array
          title: Sources
          default:
          - google_news
          - web
        timeframe_days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Timeframe Days
          default: 30
        output_language:
          type: string
          title: Output Language
          default: auto
      type: object
      required:
      - goal
      title: AgentPlanRequest
    AgentPlanResponse:
      properties:
        goal:
          type: string
          title: Goal
        research_plan:
          items:
            $ref: '#/components/schemas/AgentPlanStep'
          type: array
          title: Research Plan
        recommended_monitors:
          items:
            type: object
            properties:
              data:
                type: string
                description: Serialized response data.
          type: array
          title: Recommended Monitors
        recommended_reports:
          items:
            type: object
            properties:
              data:
                type: string
                description: Serialized response data.
          type: array
          title: Recommended Reports
        warnings:
          items:
            type: string
          type: array
          title: Warnings
      type: object
      required:
      - goal
      - research_plan
      title: AgentPlanResponse
    AgentPlanStep:
      properties:
        step:
          type: integer
          title: Step
        task:
          type: string
          title: Task
        query:
          type: string
          title: Query
        sources:
          items:
            type: string
          type: array
          title: Sources
        reason:
          type: string
          title: Reason
      type: object
      required:
      - step
      - task
      - query
      - sources
      - reason
      title: AgentPlanStep
    AgentRunRequest:
      properties:
        goal:
          type: string
          maxLength: 500
          minLength: 1
          title: Goal
        topics:
          items:
            type: string
          type: array
          title: Topics
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - rss
            - web
            - manual_csv
          type: array
          title: Sources
          default:
          - google_news
          - web
        days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Days
          default: 30
        limit:
          type: integer
          maximum: 100.0
          minimum: 1.0
          title: Limit
          default: 50
        analysis_type:
          type: string
          enum:
          - general
          - trend
          - market
          - competitor
          - customer_feedback
          - risk
          - opportunity
          title: Analysis Type
          default: trend
        output_language:
          type: string
          title: Output Language
          default: auto
        use_ai:
          type: boolean
          title: Use Ai
          default: false
        ai_provider:
          type: string
          enum:
          - auto
          - gemini
          - openai
          - none
          title: Ai Provider
          default: auto
      type: object
      required:
      - goal
      title: AgentRunRequest
    AgentRunResponse:
      properties:
        goal:
          type: string
          title: Goal
        plan:
          items:
            $ref: '#/components/schemas/AgentPlanStep'
          type: array
          title: Plan
        executed_queries:
          items:
            type: string
          type: array
          title: Executed Queries
        warnings:
          items:
            type: string
          type: array
          title: Warnings
        executive_summary:
          type: string
          title: Executive Summary
        key_findings:
          items:
            $ref: '#/components/schemas/Finding'
          type: array
          title: Key Findings
        trend_changes:
          items:
            $ref: '#/components/schemas/TrendItem'
          type: array
          title: Trend Changes
        risks:
          items:
            $ref: '#/components/schemas/RiskItem'
          type: array
          title: Risks
        opportunities:
          items:
            $ref: '#/components/schemas/OpportunityItem'
          type: array
          title: Opportunities
        recommended_next_steps:
          items:
            type: string
          type: array
          title: Recommended Next Steps
        recommended_follow_up_queries:
          items:
            type: string
          type: array
          title: Recommended Follow Up Queries
        top_results:
          items:
            $ref: '#/components/schemas/SearchResult'
          type: array
          title: Top Results
        markdown_briefing:
          type: string
          title: Markdown Briefing
          default: ''
      type: object
      required:
      - goal
      - plan
      - executive_summary
      title: AgentRunResponse
    AlertItem:
      properties:
        created_at:
          type: string
          title: Created At
          default: ''
        monitor_id:
          type: string
          title: Monitor Id
          default: ''
        monitor_name:
          type: string
          title: Monitor Name
          default: ''
        rule:
          type: string
          title: Rule
          default: ''
        message:
          type: string
          title: Message
          default: ''
        severity:
          type: string
          title: Severity
          default: info
        evidence:
          items:
            type: string
          type: array
          title: Evidence
        path:
          type: string
          title: Path
          default: ''
      type: object
      title: AlertItem
    AlertsResponse:
      properties:
        alerts:
          items:
            $ref: '#/components/schemas/AlertItem'
          type: array
          title: Alerts
      type: object
      title: AlertsResponse
    AnalysisRequest:
      properties:
        query:
          anyOf:
          - type: string
            maxLength: 500
            minLength: 1
          - type: 'null'
          title: Query
          description: Natural language public information search request. Provide
            either query or queries.
          examples:
          - Find recent Reddit discussions and Google News articles about AI search
            tools.
        queries:
          items:
            type: string
          type: array
          title: Queries
          description: Batch search queries. If provided, every query is searched
            and results are merged.
          examples:
          - - AI video tools
            - AI agent tools
            - TikTok Shop Thailand pet products
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - rss
            - web
            - manual_csv
          type: array
          title: Sources
          description: Sources to search. Defaults to Google News and general web
            search.
          default:
          - google_news
          - web
          examples:
          - - google_news
            - web
        days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Days
          description: Search recency window in days.
          default: 30
        limit:
          type: integer
          maximum: 100.0
          minimum: 1.0
          title: Limit
          description: Maximum number of results to return.
          default: 10
        language:
          type: string
          maxLength: 20
          minLength: 2
          title: Language
          description: Language code or 'any'.
