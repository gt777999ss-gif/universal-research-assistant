openapi: 3.1.0
info:
  title: Universal Research Assistant V12 GPT Actions API
  description: ChatGPT Actions optimized OpenAPI specification for the Universal Research
    Assistant. This reduced schema keeps the most important public information research,
    agent, monitoring, reporting, and MCP wrapper operations under the ChatGPT Actions
    operation limit.
  version: 12.0.0
servers:
- url: https://universal-research-assistant.onrender.com
  description: Production server
paths:
  /health:
    get:
      summary: Check service health
      description: Public health check endpoint. Does not require an API key.
      operationId: getHealth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
      security: []
  /sources:
    get:
      summary: List source availability
      description: Public endpoint showing which sources are configured and available.
      operationId: getSources
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourcesResponse'
      security: []
  /search:
    post:
      summary: Search public information sources
      description: Searches selected public sources, removes duplicate/spam/advertising
        results, ranks by relevance, summarizes each result, and returns clean JSON.
        Requires the `X-API-Key` header.
      operationId: searchPublicInformation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
            examples:
              recent_public_discussions:
                summary: Recent public discussions
                value:
                  query: Find recent public discussions about AI search tools
                  sources:
                  - google_news
                  - reddit
                  days: 30
                  limit: 10
                  language: any
                  country: any
              youtube_videos:
                summary: Recent YouTube videos
                value:
                  query: Find recent YouTube videos about automatic pet feeders
                  sources:
                  - youtube
                  days: 30
                  limit: 20
                  language: en
                  country: US
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /analyze:
    post:
      summary: Analyze public information
      description: Runs the public information search pipeline and returns a deterministic
        structured analysis report.
      operationId: analyzePublicInformation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /report:
    post:
      summary: Generate a Markdown research report
      description: Runs public information search and deterministic analysis, then
        returns a Markdown report.
      operationId: generateResearchReport
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /report/export:
    post:
      summary: Export an enterprise research report
      description: Generates and exports a research report as Markdown, HTML, JSON,
        or PDF placeholder. Requires the X-API-Key header.
      operationId: exportResearchReport
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportExportRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportExportResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /alerts:
    get:
      summary: List recent alerts
      description: Lists locally stored alert events. Requires the X-API-Key header.
      operationId: listAlerts
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsResponse'
      security:
      - APIKeyHeader: []
  /reports:
    get:
      summary: List report history
      description: Public endpoint listing report dates and recent report files.
      operationId: listReports
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportsIndexResponse'
      security: []
  /reports/latest:
    get:
      summary: Read the latest generated workflow report
      description: Public endpoint returning the latest saved workflow report from
        reports/YYYY-MM-DD/.
      operationId: getLatestReport
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportReaderResponse'
      security: []
  /reports/{workflow_id}:
    get:
      summary: Read report metadata for a workflow
      description: Public endpoint returning saved report metadata and content for
        a workflow ID. Existing YYYY-MM-DD date values continue to return the legacy
        report-date listing.
      operationId: getWorkflowReport
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/ReportReaderResponse'
                - $ref: '#/components/schemas/ReportsByDateResponse'
                title: Response Getworkflowreport
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security: []
  /reports/{workflow_id}/markdown:
    get:
      summary: Read workflow report Markdown
      description: Public endpoint returning saved Markdown report content.
      operationId: getWorkflowReportMarkdown
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      responses:
        '200':
          description: Successful Response
          content:
            text/html:
              schema:
                type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security: []
  /reports/{workflow_id}/html:
    get:
      summary: Read workflow report HTML
      description: Public endpoint returning the saved HTML report content.
      operationId: getWorkflowReportHtml
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      responses:
        '200':
          description: Successful Response
          content:
            text/html:
              schema:
                type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security: []
  /reports/{workflow_id}/json:
    get:
      summary: Read workflow report JSON
      description: Public endpoint returning the saved JSON report content.
      operationId: getWorkflowReportJson
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Getworkflowreportjson
                properties:
                  data:
                    type: string
                    description: Serialized response data.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security: []
  /reports/{workflow_id}/download:
    get:
      summary: Get workflow report download URLs
      description: Public endpoint listing download URLs for saved report formats.
      operationId: getWorkflowReportDownloads
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDownloadResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security: []
  /research/run:
    post:
      summary: Run a unified research workflow
      description: Plans, searches permitted public sources, deduplicates, ranks,
        analyzes, reports, saves, and exports one research workflow. Requires the
        X-API-Key header.
      operationId: runUnifiedResearchWorkflow
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResearchWorkflowRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchWorkflowResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /research/workflows:
    get:
      summary: List research workflow history
      description: Lists locally stored research workflow metadata. Requires the X-API-Key
        header.
      operationId: listResearchWorkflows
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowListResponse'
      security:
      - APIKeyHeader: []
  /research/workflows/{workflow_id}:
    get:
      summary: Get one research workflow
      description: Returns a saved workflow, stage status, traceable results, report,
        and download links. Requires the X-API-Key header.
      operationId: getResearchWorkflow
      security:
      - APIKeyHeader: []
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchWorkflowResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /research/templates:
    get:
      summary: List the actual research templates available in this deployment
      description: This endpoint is the authoritative source of available template
        IDs. Always call this endpoint before claiming that a requested template does
        not exist. Do not infer or invent template names from memory. Requires the
        X-API-Key header.
      operationId: listResearchTemplates
      responses:
        '200':
          description: Authoritative template registry response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchTemplatesResponse'
              example:
                templates:
                - id: ai_video_weekly
                  name: AI Video Weekly
      security:
      - APIKeyHeader: []
  /research/run-template:
    post:
      summary: Run an existing research template by exact template ID
      description: Call listResearchTemplates first when availability is unknown.
        If the exact ID appears, run it immediately. For ai_video_weekly send {"template":"ai_video_weekly"}.
        Do not request confirmation when explicitly asked. Requires the X-API-Key
        header.
      operationId: runResearchTemplate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunTemplateRequest'
            example:
              template: ai_video_weekly
        required: true
      responses:
        '200':
          description: Workflow started from the exact template ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompactResearchWorkflowResponse'
              example:
                workflow_id: 3f9fbfd9-9d16-4ec5-9c1f-4b8565956c00
                status: completed
                topic: AI video tools weekly developments
                started_at: '2026-07-11T00:00:00Z'
                completed_at: '2026-07-11T00:00:05Z'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /automation/jobs:
    get:
      summary: Automation Jobs
      operationId: listAutomationJobs
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationJobsResponse'
      security:
      - APIKeyHeader: []
    post:
      summary: Automation Create Job
      operationId: createAutomationJob
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationJobRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /automation/jobs/{job_id}:
    put:
      summary: Automation Update Job
      operationId: updateAutomationJob
      security:
      - APIKeyHeader: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationJobUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationJob'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Automation Delete Job
      operationId: deleteAutomationJob
      security:
      - APIKeyHeader: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /automation/jobs/{job_id}/run:
    post:
      summary: Automation Run Job
      operationId: runAutomationJob
      security:
      - APIKeyHeader: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRun'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /automation/runs:
    get:
      summary: Automation Runs
      operationId: listAutomationRuns
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRunsResponse'
      security:
      - APIKeyHeader: []
  /automation/digest/daily:
    post:
      summary: Automation Daily Digest
      operationId: generateDailyAutomationDigest
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationDigestRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationDigestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /automation/digest/weekly:
    post:
      summary: Automation Weekly Digest
      operationId: generateWeeklyAutomationDigest
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationDigestRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationDigestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /alerts/{alert_id}/acknowledge:
    post:
      summary: Alerts Acknowledge
      operationId: acknowledgeAlert
      security:
      - APIKeyHeader: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: string
          title: Alert Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertItem'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AgentBriefingRequest:
      properties:
        goal:
          type: string
          maxLength: 500
          minLength: 1
          title: Goal
        topics:
          items:
            type: string
          type: array
          title: Topics
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - hacker_news
            - github_releases
            - github_commits
            - rss
            - manual_csv
          type: array
          title: Sources
          default:
          - google_news
        days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Days
          default: 7
        output_language:
          type: string
          title: Output Language
          default: auto
        use_ai:
          type: boolean
          title: Use Ai
          default: false
        ai_provider:
          type: string
          enum:
          - auto
          - gemini
          - openai
          - none
          title: Ai Provider
          default: auto
      type: object
      required:
      - goal
      title: AgentBriefingRequest
    AgentBriefingResponse:
      properties:
        title:
          type: string
          title: Title
        date:
          type: string
          title: Date
        briefing:
          type: string
          title: Briefing
        top_items:
          items:
            $ref: '#/components/schemas/SearchResult'
          type: array
          title: Top Items
        watch_next:
          items:
            type: string
          type: array
          title: Watch Next
        warnings:
          items:
            type: string
          type: array
          title: Warnings
      type: object
      required:
      - title
      - date
      - briefing
      title: AgentBriefingResponse
    AgentChangesRequest:
      properties:
        topic:
          type: string
          maxLength: 500
          minLength: 1
          title: Topic
        days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Days
          default: 30
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - hacker_news
            - github_releases
            - github_commits
            - rss
            - manual_csv
          type: array
          title: Sources
          default:
          - google_news
      type: object
      required:
      - topic
      title: AgentChangesRequest
    AgentChangesResponse:
      properties:
        topic:
          type: string
          title: Topic
        new_topics:
          items:
            type: string
          type: array
          title: New Topics
        growing_topics:
          items:
            type: string
          type: array
          title: Growing Topics
        declining_topics:
          items:
            type: string
          type: array
          title: Declining Topics
        repeated_topics:
          items:
            type: string
          type: array
          title: Repeated Topics
        new_risks:
          items:
            type: string
          type: array
          title: New Risks
        new_opportunities:
          items:
            type: string
          type: array
          title: New Opportunities
        summary:
          type: string
          title: Summary
        warnings:
          items:
            type: string
          type: array
          title: Warnings
      type: object
      required:
      - topic
      - summary
      title: AgentChangesResponse
    AgentPlanRequest:
      properties:
        goal:
          type: string
          maxLength: 500
          minLength: 1
          title: Goal
        topics:
          items:
            type: string
          type: array
          title: Topics
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - hacker_news
            - github_releases
            - github_commits
            - rss
            - manual_csv
          type: array
          title: Sources
          default:
          - google_news
        timeframe_days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Timeframe Days
          default: 30
        output_language:
          type: string
          title: Output Language
          default: auto
      type: object
      required:
      - goal
      title: AgentPlanRequest
    AgentPlanResponse:
      properties:
        goal:
          type: string
          title: Goal
        research_plan:
          items:
            $ref: '#/components/schemas/AgentPlanStep'
          type: array
          title: Research Plan
        recommended_monitors:
          items:
            type: object
            properties:
              data:
                type: string
                description: Serialized response data.
          type: array
          title: Recommended Monitors
        recommended_reports:
          items:
            type: object
            properties:
              data:
                type: string
                description: Serialized response data.
          type: array
          title: Recommended Reports
        warnings:
          items:
            type: string
          type: array
          title: Warnings
      type: object
      required:
      - goal
      - research_plan
      title: AgentPlanResponse
    AgentPlanStep:
      properties:
        step:
          type: integer
          title: Step
        task:
          type: string
          title: Task
        query:
          type: string
          title: Query
        sources:
          items:
            type: string
          type: array
          title: Sources
        reason:
          type: string
          title: Reason
      type: object
      required:
      - step
      - task
      - query
      - sources
      - reason
      title: AgentPlanStep
    AgentRunRequest:
      properties:
        goal:
          type: string
          maxLength: 500
          minLength: 1
          title: Goal
        topics:
          items:
            type: string
          type: array
          title: Topics
        sources:
          items:
            type: string
            enum:
            - youtube
            - x
            - tiktok
            - reddit
            - google_news
            - hacker_news
            - github_releases
            - github_commits
            - rss
            - manual_csv
          type: array
          title: Sources
          default:
          - google_news
        days:
          type: integer
          maximum: 365.0
          minimum: 1.0
          title: Days
          default: 30
        limit:
          type: integer
          maximum: 100.0
          minimum: 1.0
          title: Limit
          default: 50
        analysis_type:
          type: string
          enum:
          - general
          - trend
          - market
          - competitor
          - customer_feedback
          - risk
          - opportunity
          title: Analysis Type
          default: trend
        output_language:
          type: string
          title: Output Language
          default: auto
        use_ai:
          type: boolean
          title: Use Ai
          default: false
        ai_provider:
          type: string
          enum:
          - auto
          - gemini
          - openai
          - none
          title: Ai Provider
          default: auto
      type: object
      required:
      - goal
      title: AgentRunRequest
    AgentRunResponse:
      properties:
        goal:
          type: string
          title: Goal
        plan:
          items:
            $ref: '#/components/schemas/AgentPlanStep'
          type: array
          title: Plan
        executed_queries:
          items:
            type: string
          type: array
          title: Executed Queries
        warnings:
          items:
            type: string
          type: array
          title: Warnings
        executive_summary:
          type: string
          title: Executive Summary
        key_findings:
          items:
            $ref: '#/components/schemas/Finding'
          type: array
          title: Key Findings
        trend_changes:
          items:
            $ref: '#/components/schemas/TrendItem'
          type: array
          title: Trend Changes
        risks:
          items:
            $ref: '#/components/schemas/RiskItem'
          type: array
          title: Risks
        opportunities:
          items:
            $ref: '#/components/schemas/OpportunityItem'
          type: array
          title: Opportunities
        recommended_next_steps:
          items:
            type: string
          type: array
          title: Recommended Next Steps
